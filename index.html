<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Hot Wheels Collection</title>
<style>
:root {
  --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222f;
  --border: #2e2e3e; --red: #e8293a; --red-dim: rgba(232,41,58,0.10);
  --text: #f0f0f4; --text-dim: #8888a0; --yellow: #f5c842; --green: #3ecf8e;
  --mono: 'JetBrains Mono','Fira Mono',monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 13px; min-height: 100vh; }

/* LOGIN */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; z-index: 9999;
}
.login-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 32px 28px; width: 320px; text-align: center;
}
.login-box .lock { font-size: 44px; margin-bottom: 12px; }
.login-box h2 { font-size: 18px; font-weight: 800; color: var(--red); margin-bottom: 6px; }
.login-box p { font-size: 12px; color: var(--text-dim); margin-bottom: 20px; }
.login-box input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: 7px; padding: 10px 14px; font-size: 14px;
  outline: none; margin-bottom: 10px; letter-spacing: 3px; text-align: center;
}
.login-box input:focus { border-color: var(--red); }
.login-box button {
  width: 100%; background: var(--red); color: #fff; border: none;
  border-radius: 7px; padding: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
}
.login-box button:hover { opacity: 0.85; }
.login-error { color: var(--red); font-size: 12px; min-height: 18px; margin-top: 8px; }

/* APP */
#app { display: none; }
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 20px; display: flex; align-items: center; gap: 14px;
  flex-wrap: wrap; position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 18px; font-weight: 800; color: var(--red); letter-spacing: -0.5px; white-space: nowrap; }
.logo span { color: var(--text); }
.stats { display: flex; gap: 10px; flex-wrap: wrap; }
.stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 11px; font-family: var(--mono); color: var(--text-dim); }
.stat b { color: var(--yellow); }
.logout-btn { margin-left: auto; background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; }
.logout-btn:hover { color: var(--red); border-color: var(--red); }

.controls {
  display: flex; gap: 8px; padding: 10px 20px; flex-wrap: wrap;
  align-items: center; background: var(--bg); border-bottom: 1px solid var(--border);
  position: sticky; top: 55px; z-index: 99;
}
input[type=search], select {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: 12px; outline: none;
}
input[type=search]:focus, select:focus { border-color: var(--red); }
input[type=search] { width: 200px; }
.btn { background: var(--red); color: #fff; border: none; border-radius: 6px; padding: 6px 13px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn.sec { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
.btn.del { background: #333; color: var(--red); border: 1px solid var(--red); }
.count-label { font-size: 11px; color: var(--text-dim); margin-left: auto; font-family: var(--mono); }

.table-wrap { overflow-x: auto; padding: 0 20px 100px; }
table { width: 100%; border-collapse: collapse; min-width: 900px; margin-top: 10px; }
thead th {
  background: var(--surface); color: var(--text-dim); font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px; padding: 8px 10px;
  border-bottom: 2px solid var(--red); text-align: left; white-space: nowrap;
  cursor: pointer; user-select: none;
}
thead th:hover { color: var(--text); }
thead th.asc::after { content: ' ↑'; color: var(--red); }
thead th.desc::after { content: ' ↓'; color: var(--red); }
tbody tr:hover td { background: var(--red-dim); }
td {
  padding: 5px 10px; border-bottom: 1px solid var(--border);
  white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis;
  vertical-align: middle;
}
td.edit { cursor: pointer; }
td.edit:hover { background: rgba(255,255,255,0.04); }
td input { background: var(--surface); border: 1px solid var(--red); color: var(--text); border-radius: 4px; padding: 2px 6px; font-size: 12px; width: 100%; min-width: 80px; outline: none; }
.tag { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; font-size: 10px; color: var(--text-dim); }
.tag.mainline { border-color: #4466ff; color: #4466ff; }
.tag.premium,.tag.silver-series { border-color: var(--yellow); color: var(--yellow); }
.tag.car-culture { border-color: var(--green); color: var(--green); }

/* Special tags */
.sp { display: inline-block; border-radius: 3px; padding: 1px 6px; font-size: 10px; font-weight: 700; white-space: nowrap; }
.sp-sth  { background: #ff6b00; color: #fff; }                /* Super Treasure Hunt - orange */
.sp-th   { background: #ffd700; color: #000; }                /* Treasure Hunt - gold */
.sp-chase { background: #c0392b; color: #fff; }               /* Chase - red */
.sp-super-chase { background: #8e44ad; color: #fff; }         /* Super Chase - purple */
.sp-raw-chase { background: #2c3e50; color: #ecf0f1; border: 1px solid #7f8c8d; } /* Raw Chase - dark */
.sp-limited { background: #1a6b3c; color: #fff; }             /* Limited Edition - green */
.sp-nismo  { background: #c0392b; color: #fff; border: 2px solid #e74c3c; } /* NISMO - red */
.sp-mbx-chase { background: #2980b9; color: #fff; }           /* Matchbox Super Chase - blue */

.new-row-form {
  position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
  border-top: 2px solid var(--red); padding: 10px 20px; display: none;
  gap: 8px; flex-wrap: wrap; align-items: flex-end; z-index: 200;
}
.new-row-form.on { display: flex; }
.field-group { display: flex; flex-direction: column; gap: 2px; }
.field-group label { font-size: 9px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; }
.new-row-form input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 5px 8px; font-size: 11px; width: 100px; outline: none; }
.new-row-form input:focus { border-color: var(--red); }

.toast { position: fixed; bottom: 80px; right: 20px; background: var(--green); color: #000; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; opacity: 0; transition: opacity 0.3s; z-index: 300; }
.toast.on { opacity: 1; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="lock">🔒</div>
    <h2>Hot Wheels Collection</h2>
    <p>请输入密码以访问收藏清单</p>
    <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
    <button onclick="tryLogin()">进入</button>
    <div class="login-error" id="pw-err"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">🚗 Hot<span>Wheels</span></div>
    <div class="stats">

      <div class="stat">库存 <b id="s-stock">0</b></div>
      <div class="stat">成本 <b id="s-cost">$0</b></div>
      <div class="stat">已售 <b id="s-sold">0</b></div>
      <div class="stat">收入 <b id="s-income">$0</b></div>
    </div>
    <button class="logout-btn" onclick="logout()">退出</button>
  </header>

  <div class="controls">
    <input type="search" id="search" placeholder="🔍 搜索名称、系列…" oninput="filter()">
    <select id="f-type" onchange="filter()"><option value="">所有类型</option></select>
    <select id="f-year" onchange="filter()"><option value="">所有年份</option></select>
    <select id="f-mfr" onchange="filter()"><option value="">所有制造商</option></select>
    <select id="f-brand" onchange="filter()"><option value="">所有品牌</option></select>
    <select id="f-special" onchange="filter()"><option value="">所有Special</option></select>
    <button class="btn" onclick="toggleAdd()">+ 添加</button>
    <button class="btn sec" onclick="exportCSV()">导出 CSV</button>
    <span class="count-label" id="count"></span>
  </div>

  <div class="table-wrap">
    <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
  </div>
</div>

<div class="new-row-form" id="add-form"></div>
<div class="toast" id="toast"></div>

async function sha256(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
async function tryLogin() {
  const h = await sha256(document.getElementById('pw').value);
  if (h === PASS_HASH) { sessionStorage.setItem('hw_ok', h); showApp(); }

}
function logout() { sessionStorage.removeItem('hw_ok'); location.reload(); }

let rows = [], vis = [], sortC = null, sortD = 1;

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  rows = RAW.map((r,i)=>({...Object.fromEntries(H.map((h,j)=>[h,r[j]??''])),_id:i}));
  buildHead(); buildFilters(); filter();
}

function buildHead() {
  const tr = document.createElement('tr');
  H.forEach((h,i)=>{ const th=document.createElement('th'); th.textContent=h; th.onclick=()=>sortBy(i); tr.appendChild(th); });
  const th=document.createElement('th'); th.textContent='操作'; tr.appendChild(th);
  document.getElementById('thead').appendChild(tr);
}

function buildFilters() {
  const add=(id,vals)=>{ const s=document.getElementById(id); vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);}); };
  add('f-type',[...new Set(rows.map(r=>r['Type']).filter(Boolean))].sort());
  add('f-year',[...new Set(rows.map(r=>r['Year']).filter(Boolean))].sort((a,b)=>b-a));
  add('f-mfr',[...new Set(rows.map(r=>r['Manufacturer']).filter(Boolean))].sort());
  add('f-brand',[...new Set(rows.map(r=>r['Brand']).filter(Boolean))].sort());
  add('f-special',[...new Set(rows.map(r=>r['Special']).filter(Boolean))].sort());
}

function render() {
  const tb = document.getElementById('tbody'); tb.innerHTML='';
  vis.forEach(row=>{
    const tr=document.createElement('tr');
    H.forEach(h=>{
      const td=document.createElement('td'); td.title=String(row[h]??'');
      if(h==='Type'){
        const t=document.createElement('span'); t.className='tag '+(row[h]||'').toLowerCase().replace(/[\s\/]+/g,'-'); t.textContent=row[h]||''; td.appendChild(t);
      } else if(h==='Special' && row[h]) {
        const spMap = {
          'Super Treasure Hunt': 'sp-sth',
          'Treasure Hunt': 'sp-th',
          'Chase': 'sp-chase',
          'Super Chase': 'sp-super-chase',
          'Raw Chase': 'sp-raw-chase',
          'Limited Edition': 'sp-limited',
          'NISMO Festival Exclusive ': 'sp-nismo',
          'Matchbox Super Chase': 'sp-mbx-chase',
        };
        const s=document.createElement('span');
        s.className='sp '+(spMap[row[h]]||'sp-chase');
        s.textContent=row[h]; td.appendChild(s);
        td.className='edit'; td.ondblclick=()=>startEdit(td,row,h);
      } else { td.textContent=row[h]??''; td.className='edit'; td.ondblclick=()=>startEdit(td,row,h); }
      tr.appendChild(td);
    });
    const td=document.createElement('td');
    const b=document.createElement('button'); b.className='btn del'; b.textContent='删'; b.style.cssText='font-size:10px;padding:2px 6px'; b.onclick=()=>delRow(row._id);
    td.appendChild(b); tr.appendChild(td); tb.appendChild(tr);
  });
  const cost=rows.reduce((s,r)=>s+(parseFloat(r['Cost $'])||0),0);
  const income=rows.reduce((s,r)=>s+(parseFloat(r['Income $'])||0),0);
  document.getElementById('s-total').textContent=rows.length;
  document.getElementById('s-stock').textContent=rows.reduce((s,r)=>s+(parseFloat(r['Amount'])||0),0);
  document.getElementById('s-cost').textContent='$'+cost.toFixed(0);
  document.getElementById('s-sold').textContent=rows.reduce((s,r)=>s+(parseFloat(r['Sold Amount'])||0),0);
  document.getElementById('s-income').textContent='$'+income.toFixed(0);
  document.getElementById('count').textContent=`显示 ${vis.length} / ${rows.length} 条`;
}

function startEdit(td,row,h) {
  const old=row[h]??''; const inp=document.createElement('input'); inp.value=old;
  td.textContent=''; td.appendChild(inp); inp.focus(); inp.select();
  const save=()=>{ row[h]=inp.value; td.textContent=inp.value; td.title=inp.value; toast('已保存'); };
  inp.onblur=save; inp.onkeydown=e=>{ if(e.key==='Enter')save(); if(e.key==='Escape')td.textContent=old; };
}

function delRow(id) {
  if(!confirm('确定删除？'))return;
  rows=rows.filter(r=>r._id!==id); filter(); toast('已删除');
}

function filter() {
  const q=document.getElementById('search').value.toLowerCase();
  const t=document.getElementById('f-type').value, y=document.getElementById('f-year').value;
  const m=document.getElementById('f-mfr').value, b=document.getElementById('f-brand').value;
  const sp=document.getElementById('f-special').value;
  vis=rows.filter(r=>{
    if(t&&r['Type']!==t)return false;
    if(y&&String(r['Year'])!==String(y))return false;
    if(m&&r['Manufacturer']!==m)return false;
    if(b&&r['Brand']!==b)return false;
    if(sp&&r['Special']!==sp)return false;
    if(q&&![r['Name'],r['Series'],r['Brand'],r['Manufacturer'],r['Special']].join(' ').toLowerCase().includes(q))return false;
    return true;
  });
  if(sortC!==null)doSort(false);
  render();
}

function sortBy(i) { if(sortC===i)sortD*=-1; else{sortC=i;sortD=1;} doSort(true); }
function doSort(re) {
  const h=H[sortC];
  vis.sort((a,b)=>{ let av=a[h]??'',bv=b[h]??''; return(!isNaN(Number(av))&&!isNaN(Number(bv)))?(Number(av)-Number(bv))*sortD:String(av).localeCompare(String(bv))*sortD; });
  document.querySelectorAll('thead th').forEach((th,i)=>{ th.classList.remove('asc','desc'); if(i===sortC)th.classList.add(sortD===1?'asc':'desc'); });
  if(re)render();
}

function toggleAdd() {
  const f=document.getElementById('add-form');
  if(f.classList.contains('on')){f.classList.remove('on');return;}
  f.innerHTML='';
  ['Brand','Name','Type','Series','Special','Manufacturer','Year','Number','Date','Price $','Amount'].forEach(h=>{
    const g=document.createElement('div'); g.className='field-group';
    const l=document.createElement('label'); l.textContent=h;
    const inp=document.createElement('input'); inp.id='nf-'+h; inp.placeholder=h;
    g.appendChild(l); g.appendChild(inp); f.appendChild(g);
  });
  const a=document.createElement('button'); a.className='btn'; a.textContent='✓ 确认'; a.onclick=addRow; f.appendChild(a);
  const c=document.createElement('button'); c.className='btn sec'; c.textContent='取消'; c.onclick=()=>f.classList.remove('on'); f.appendChild(c);
  f.classList.add('on');
}

function addRow() {
  const r={}; H.forEach(h=>{const el=document.getElementById('nf-'+h);r[h]=el?el.value:'';}); r._id=Date.now();
  rows.unshift(r); document.getElementById('add-form').classList.remove('on'); filter(); toast('已添加！');
}

function exportCSV() {
  const out=[H.join(','),...rows.map(r=>H.map(h=>JSON.stringify(r[h]??'')).join(','))];
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(out.join('\n')); a.download='hot-wheels.csv'; a.click();
}

function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),1800); }
</script>
