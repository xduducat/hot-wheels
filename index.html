<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Diecast Collection</title>
<style>
:root {
  --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222f;
  --border: #2e2e3e; --red: #e8293a; --red-dim: rgba(232,41,58,0.10);
  --text: #f0f0f4; --text-dim: #8888a0; --yellow: #f5c842; --green: #3ecf8e;
  --mono: 'JetBrains Mono','Fira Mono',monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 13px; min-height: 100vh; }

/* LOGIN */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; z-index: 9999;
}
.login-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 32px 28px; width: 320px; text-align: center;
}
.login-box .lock { font-size: 44px; margin-bottom: 12px; }
.login-box h2 { font-size: 18px; font-weight: 800; color: var(--red); margin-bottom: 6px; }
.login-box p { font-size: 12px; color: var(--text-dim); margin-bottom: 20px; }
.login-box input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: 7px; padding: 10px 14px; font-size: 14px;
  outline: none; margin-bottom: 10px; letter-spacing: 3px; text-align: center;
}
.login-box input:focus { border-color: var(--red); }
.login-box button {
  width: 100%; background: var(--red); color: #fff; border: none;
  border-radius: 7px; padding: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
}
.login-box button:hover { opacity: 0.85; }
.login-error { color: var(--red); font-size: 12px; min-height: 18px; margin-top: 8px; }

/* LOADING */
#loading-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px; z-index: 9998;
}
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--red); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text-dim); font-size: 13px; }

/* APP */
#app { display: none; }
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 20px; display: flex; align-items: center; gap: 14px;
  flex-wrap: wrap; position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 18px; font-weight: 800; color: var(--red); letter-spacing: -0.5px; white-space: nowrap; }
.logo span { color: var(--text); }
.stats { display: flex; gap: 10px; flex-wrap: wrap; }
.stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 11px; font-family: var(--mono); color: var(--text-dim); }
.stat b { color: var(--yellow); }
.header-btns { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.save-btn { background: var(--green); color: #000; border: none; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 700; cursor: pointer; display: none; }
.save-btn.visible { display: block; }
.save-btn:hover { opacity: 0.85; }
.logout-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; }
.logout-btn:hover { color: var(--red); border-color: var(--red); }
.unsaved-dot { width: 7px; height: 7px; background: var(--yellow); border-radius: 50%; display: none; }
.unsaved-dot.visible { display: inline-block; }

.controls {
  display: flex; gap: 8px; padding: 10px 20px; flex-wrap: wrap;
  align-items: center; background: var(--bg); border-bottom: 1px solid var(--border);
  position: sticky; top: 55px; z-index: 99;
}
input[type=search], select {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: 12px; outline: none;
}
input[type=search]:focus, select:focus { border-color: var(--red); }
input[type=search] { width: 200px; }
.btn { background: var(--red); color: #fff; border: none; border-radius: 6px; padding: 6px 13px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn.sec { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
.btn.del { background: #333; color: var(--red); border: 1px solid var(--red); }
.btn.ins { background: #333; color: var(--text-dim); border: 1px solid var(--border); }
.btn.ins:hover { color: var(--green); border-color: var(--green); }
.count-label { font-size: 11px; color: var(--text-dim); margin-left: auto; font-family: var(--mono); }

.table-wrap { overflow-x: auto; padding: 0 20px 100px; }
table { width: 100%; border-collapse: collapse; min-width: 900px; margin-top: 10px; }
thead th {
  background: var(--surface); color: var(--text-dim); font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px; padding: 8px 10px;
  border-bottom: 2px solid var(--red); text-align: left; white-space: nowrap;
  cursor: pointer; user-select: none;
  position: sticky; top: 0; z-index: 98;
}
thead th:hover { color: var(--text); }
thead th.asc::after { content: ' ↑'; color: var(--red); }
thead th.desc::after { content: ' ↓'; color: var(--red); }
tbody tr:hover td { background: var(--red-dim); }
tbody tr.dirty td:first-child { border-left: 2px solid var(--yellow); }
td {
  padding: 5px 10px; border-bottom: 1px solid var(--border);
  white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis;
  vertical-align: middle;
}
td.col-name {
  white-space: normal; min-width: 240px; max-width: 360px;
  overflow: visible; text-overflow: unset; line-height: 1.4;
}
td.edit { cursor: pointer; }
td.edit:hover { background: rgba(255,255,255,0.04); }
td input { background: var(--surface); border: 1px solid var(--red); color: var(--text); border-radius: 4px; padding: 2px 6px; font-size: 12px; width: 100%; min-width: 80px; outline: none; }

.tag { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; font-size: 10px; color: var(--text-dim); }

.sp { display: inline-block; border-radius: 3px; padding: 1px 6px; font-size: 10px; font-weight: 700; white-space: nowrap; }
.sp-sth  { background: #7aff3e; color: #000; }
.sp-th   { background: #ffd700; color: #000; }
.sp-chase { background: #66ffe4; color: #000; }
.sp-super-chase { background: #7aff3e; color: #000; }
.sp-raw-chase { background: #66ffe4; color: #000; }
.sp-limited { background: #1a6b3c; color: #fff; }
.sp-nismo  { background: #c0392b; color: #fff; border: 2px solid #e74c3c; }
.sp-mbx-chase { background: #2980b9; color: #fff; }

.new-row-form {
  position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
  border-top: 2px solid var(--red); padding: 10px 20px; display: none;
  gap: 8px; flex-wrap: wrap; align-items: flex-end; z-index: 200;
}
.new-row-form.on { display: flex; }
.field-group { display: flex; flex-direction: column; gap: 2px; }
.field-group label { font-size: 9px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; }
.new-row-form input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 5px 8px; font-size: 11px; width: 100px; outline: none; }
.new-row-form input:focus { border-color: var(--red); }

.toast { position: fixed; bottom: 80px; right: 20px; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; opacity: 0; transition: opacity 0.3s; z-index: 300; }
.toast.on { opacity: 1; }
.toast.success { background: var(--green); color: #000; }
.toast.error { background: var(--red); color: #fff; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="lock">🔒</div>
    <h2>Diecast Collection</h2>
    <p>Enter password to access your collection</p>
    <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
    <button onclick="tryLogin()">Enter</button>
    <div class="login-error" id="pw-err"></div>
  </div>
</div>

<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Loading data from Google Sheets…</div>
</div>

<div id="app">
  <header>
    <div class="logo">🚗 Die<span>cast</span></div>
    <div class="stats">
      <div class="stat">Total <b id="s-total">0</b></div>
      <div class="stat">In Stock <b id="s-stock">0</b></div>
      <div class="stat">Cost <b id="s-cost">$0</b></div>
      <div class="stat">Sold <b id="s-sold">0</b></div>
      <div class="stat">Income <b id="s-income">$0</b></div>
    </div>
    <div class="header-btns">
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="controls">
    <input type="search" id="search" placeholder="🔍 Search name, series…" oninput="filter()">
    <select id="f-type" onchange="filter()"><option value="">All Types</option></select>
    <select id="f-year" onchange="filter()"><option value="">All Years</option></select>
    <select id="f-mfr" onchange="filter()"><option value="">All Makes</option></select>
    <select id="f-brand" onchange="filter()"><option value="">All Brands</option></select>
    <select id="f-special" onchange="filter()"><option value="">All Specials</option></select>
    <button class="btn" onclick="toggleAdd()">+ Add</button>
    <button class="btn sec" onclick="exportCSV()">Export CSV</button>
    <span class="count-label" id="count"></span>
  </div>

  <div class="table-wrap">
    <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
  </div>
</div>

<div class="new-row-form" id="add-form"></div>
<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxM4QzzA3PNwduouOB_HaRF2tXLcxPExkDhLFXgeVUgQbwROvvHd-Yl0vGX1e-DjAT9/exec';
const PASS_HASH = '795f57a507b6f85c56e32364eefe8c3fffc720a7e83403bf755449049a45eabd';
const EXCLUDE = new Set(['Location','Store','Comments']);
let allHeaders = [], keepIdx = [];

// ── AUTH ────────────────────────────────────────────
async function sha256(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
async function tryLogin() {
  const h = await sha256(document.getElementById('pw').value);
  if (h === PASS_HASH) { sessionStorage.setItem('hw_ok', h); showLoading(); loadFromSheets(); }
  else { const e=document.getElementById('pw-err'); e.textContent='Incorrect password'; setTimeout(()=>e.textContent='',2000); document.getElementById('pw').value=''; }
}
function logout() { sessionStorage.removeItem('hw_ok'); location.reload(); }
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });
if (sessionStorage.getItem('hw_ok')===PASS_HASH) { showLoading(); loadFromSheets(); }

// ── SCREENS ─────────────────────────────────────────
function showLoading() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'flex';
}
function showApp() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ── DATA ─────────────────────────────────────────────
let H = [], rows = [], vis = [], sortC = null, sortD = 1, dirty = false;

async function loadFromSheets() {
  try {
    const res = await fetch(API_URL);
    const raw = await res.json();
    allHeaders = raw[0];
    keepIdx = allHeaders.map((h,i)=>EXCLUDE.has(h)?-1:i).filter(i=>i>=0);
    H = keepIdx.map(i=>allHeaders[i]);
    rows = raw.slice(1)
      .filter(r => !(r[0]==='' && r[1]===''))
      .map((r,i) => ({...Object.fromEntries(H.map((h,j)=>[h, r[keepIdx[j]]??''])), _id:i, _sheetRow: i+2}));
    dirty = false;
    buildHead();
    buildFilters();
    filter();
    showApp();
  } catch(e) {
    document.getElementById('loading-text').textContent = 'Failed to load, please refresh';
    console.error(e);
  }
}

// ── UI ───────────────────────────────────────────────
async function saveCell(row, h, value) {
  const sheetRow = row._sheetRow;
  const colIdx = allHeaders.indexOf(h);
  if (sheetRow == null || colIdx === -1) { console.log('EARLY RETURN - sheetRow:', sheetRow, 'colIdx:', colIdx); return; }
  try {
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ row: sheetRow, col: colIdx + 1, value }),
    });
    toast('Saved ✓', 'success');
    // Wait 1.5s for Sheets to recalculate, then refresh the row
    setTimeout(() => refreshRow(row), 1500);
  } catch(e) {
    toast('Save failed', 'error');
  }
}

async function refreshRow(row) {
  try {
    const res = await fetch(API_URL + '?t=' + Date.now());
    const raw = await res.json();
    const sheetRowData = raw[row._sheetRow - 1];
    if (!sheetRowData) return;
    H.forEach((header, j) => {
      row[header] = sheetRowData[keepIdx[j]] ?? '';
    });
    updateStats();
    render();
  } catch(e) {}
}

function buildHead() {
  document.getElementById('thead').innerHTML = '';
  const tr = document.createElement('tr');
  H.forEach((h,i)=>{ const th=document.createElement('th'); th.textContent=h; th.onclick=()=>sortBy(i); tr.appendChild(th); });
  const th=document.createElement('th'); th.textContent='Action'; tr.appendChild(th);
  document.getElementById('thead').appendChild(tr);
}

function buildFilters() {
  const add=(id,vals)=>{ const s=document.getElementById(id); s.innerHTML='<option value="">'+s.options[0].text+'</option>'; vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);}); };
  add('f-type',[...new Set(rows.map(r=>r['Type']).filter(Boolean))].sort());
  add('f-year',[...new Set(rows.map(r=>r['Year']).filter(Boolean))].sort((a,b)=>b-a));
  add('f-mfr',[...new Set(rows.map(r=>r['Manufacturer']).filter(Boolean))].sort());
  add('f-brand',[...new Set(rows.map(r=>r['Brand']).filter(Boolean))].sort());
  add('f-special',[...new Set(rows.map(r=>r['Special']).filter(Boolean))].sort());
}

const SP_MAP = {
  'Super Treasure Hunt':'sp-sth','Treasure Hunt':'sp-th','Chase':'sp-chase',
  'Super Chase':'sp-super-chase','Raw Chase':'sp-raw-chase',
  'Limited Edition':'sp-limited','NISMO Festival Exclusive ':'sp-nismo',
  'Matchbox Super Chase':'sp-mbx-chase'
};

function render() {
  const tb = document.getElementById('tbody'); tb.innerHTML='';
  vis.forEach(row=>{
    const tr=document.createElement('tr');
    H.forEach(h=>{
      const td=document.createElement('td'); td.title=String(row[h]??''); if(h==='Name') td.classList.add('col-name');
      if(h==='Special'&&row[h]){
        const amount = parseFloat(row['Amount'])||0;
        if (amount > 0) {
          const s=document.createElement('span'); s.className='sp '+(SP_MAP[row[h]]||'sp-chase'); s.textContent=row[h]; td.appendChild(s);
        } else {
          td.textContent=row[h];
        }
        td.className='edit'; td.ondblclick=()=>startEdit(td,row,h);
      } else { td.textContent=row[h]??''; td.className='edit'; td.ondblclick=()=>startEdit(td,row,h); }
      tr.appendChild(td);
    });
    const td=document.createElement('td'); td.style.whiteSpace='nowrap';
    const ins=document.createElement('button'); ins.className='btn ins'; ins.textContent='+'; ins.style.cssText='font-size:10px;padding:2px 6px;margin-right:4px'; ins.title='Insert row below'; ins.onclick=()=>insertRowBelow(row);
    const b=document.createElement('button'); b.className='btn del'; b.textContent='Del'; b.style.cssText='font-size:10px;padding:2px 6px'; b.onclick=()=>delRow(row._id);
    td.appendChild(ins); td.appendChild(b); tr.appendChild(td); tb.appendChild(tr);
  });
  document.getElementById('s-total').textContent=rows.length;
  document.getElementById('s-stock').textContent=rows.reduce((s,r)=>s+(parseFloat(r['Amount'])||0),0);
  document.getElementById('s-cost').textContent='$'+rows.reduce((s,r)=>s+(parseFloat(r['Cost $'])||0),0).toFixed(0);
  document.getElementById('s-sold').textContent=rows.reduce((s,r)=>s+(parseFloat(r['Sold Amount'])||0),0);
  updateStats();
  document.getElementById('count').textContent=`Showing ${vis.length} / ${rows.length}`;
  // Dynamically fix thead sticky top
  const headerH = document.querySelector('header').offsetHeight;
  const controlsH = document.querySelector('.controls').offsetHeight;
  document.querySelectorAll('thead th').forEach(th => {
    th.style.top = (headerH + controlsH) + 'px';
  });
}

function updateStats() {
  document.getElementById('s-total').textContent=rows.length;
  document.getElementById('s-stock').textContent=rows.reduce((s,r)=>s+(parseFloat(r['Amount'])||0),0);
  document.getElementById('s-cost').textContent='$'+rows.reduce((s,r)=>s+(parseFloat(r['Cost $'])||0),0).toFixed(0);
  document.getElementById('s-sold').textContent=rows.reduce((s,r)=>s+(parseFloat(r['Sold Amount'])||0),0);
  document.getElementById('s-income').textContent='$'+rows.reduce((s,r)=>s+(parseFloat(r['Income $'])||0),0).toFixed(0);
}

function startEdit(td,row,h) {
  const old=row[h]??''; const inp=document.createElement('input'); inp.value=old;
  td.textContent=''; td.appendChild(inp); inp.focus(); inp.select();
  let saved = false;
  const save=()=>{
    if(saved) return; saved=true;
    const newVal = inp.value;
    row[h]=newVal; td.textContent=newVal; td.title=newVal;
    updateStats();
    saveCell(row, h, newVal);
  };
  inp.onblur=save; inp.onkeydown=e=>{ if(e.key==='Enter'){save();} if(e.key==='Escape'){td.textContent=old;} };
}

function delRow(id) {
  if(!confirm('Delete this row?'))return;
  rows=rows.filter(r=>r._id!==id); filter(); toast('Deleted (local only)','success');
}

function insertRowBelow(refRow) {
  const idx = rows.indexOf(refRow);
  const newRow = Object.fromEntries(H.map(h=>[h,'']));
  newRow._id = Date.now();
  newRow._sheetRow = null; // new row, no sheet position yet
  rows.splice(idx + 1, 0, newRow);
  filter();
  // Find the new row's first editable cell and start editing
  setTimeout(() => {
    const trs = document.getElementById('tbody').querySelectorAll('tr');
    const visIdx = vis.indexOf(newRow);
    if (visIdx >= 0 && trs[visIdx]) {
      const firstTd = trs[visIdx].querySelectorAll('td.edit')[1]; // Name column
      if (firstTd) firstTd.dispatchEvent(new MouseEvent('dblclick'));
    }
  }, 50);
  toast('Row inserted — fill in details and save', 'success');
}

function filter() {
  const q=document.getElementById('search').value.toLowerCase();
  const t=document.getElementById('f-type').value, y=document.getElementById('f-year').value;
  const m=document.getElementById('f-mfr').value, b=document.getElementById('f-brand').value;
  const sp=document.getElementById('f-special').value;
  vis=rows.filter(r=>{
    if(t&&r['Type']!==t)return false;
    if(y&&String(r['Year'])!==String(y))return false;
    if(m&&r['Manufacturer']!==m)return false;
    if(b&&r['Brand']!==b)return false;
    if(sp&&r['Special']!==sp)return false;
    if(q&&![r['Name'],r['Series'],r['Brand'],r['Manufacturer'],r['Special']].join(' ').toLowerCase().includes(q))return false;
    return true;
  });
  if(sortC!==null)doSort(false);
  render();
}

function sortBy(i) { if(sortC===i)sortD*=-1; else{sortC=i;sortD=1;} doSort(true); }
function doSort(re) {
  const h=H[sortC];
  vis.sort((a,b)=>{ let av=a[h]??'',bv=b[h]??''; return(!isNaN(Number(av))&&!isNaN(Number(bv)))?(Number(av)-Number(bv))*sortD:String(av).localeCompare(String(bv))*sortD; });
  document.querySelectorAll('thead th').forEach((th,i)=>{ th.classList.remove('asc','desc'); if(i===sortC)th.classList.add(sortD===1?'asc':'desc'); });
  if(re)render();
}

function toggleAdd() {
  const f=document.getElementById('add-form');
  if(f.classList.contains('on')){f.classList.remove('on');return;}
  f.innerHTML='';
  ['Brand','Name','Type','Series','Special','Manufacturer','Year','Number','Date','Price $','Amount'].forEach(h=>{
    const g=document.createElement('div'); g.className='field-group';
    const l=document.createElement('label'); l.textContent=h;
    const inp=document.createElement('input'); inp.id='nf-'+h; inp.placeholder=h;
    g.appendChild(l); g.appendChild(inp); f.appendChild(g);
  });
  const a=document.createElement('button'); a.className='btn'; a.textContent='✓ Confirm'; a.onclick=addRow; f.appendChild(a);
  const c=document.createElement('button'); c.className='btn sec'; c.textContent='Cancel'; c.onclick=()=>f.classList.remove('on'); f.appendChild(c);
  f.classList.add('on');
}

function addRow() {
  const r={}; H.forEach(h=>{const el=document.getElementById('nf-'+h);r[h]=el?el.value:'';}); r._id=Date.now();
  rows.unshift(r); document.getElementById('add-form').classList.remove('on'); filter(); toast('Added (local only, refresh to sync)','success');
}

function exportCSV() {
  const out=[H.join(','),...rows.map(r=>H.map(h=>JSON.stringify(r[h]??'')).join(','))];
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(out.join('\n')); a.download='hot-wheels.csv'; a.click();
}

function toast(msg, type='success') {
  const t=document.getElementById('toast'); t.textContent=msg;
  t.className='toast '+type+' on';
  setTimeout(()=>t.classList.remove('on'),2500);
}
</script>
</body>
</html>
